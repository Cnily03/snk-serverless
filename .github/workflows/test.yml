name: Test

on:
  - push
  - pull_request


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 10
        run_install: false
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: pnpm
        cache-dependency-path: |
          pnpm-lock.yaml
          package-lock.json
          yarn.lock
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Build
      run: pnpm run lint
